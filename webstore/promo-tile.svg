<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#342b35" opacity="0.055"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="440" height="280" fill="#fff8dc"/>
  <rect width="440" height="280" fill="url(#dots)"/>

  <!-- tape, top-right -->
  <g transform="translate(395 30) rotate(-24)">
    <rect x="-48" y="-13" width="96" height="26" rx="4" fill="#ffd84f" stroke="#342b35" stroke-width="2.5"/>
    <line x1="-30" y1="-13" x2="-30" y2="13" stroke="#342b35" stroke-width="1" opacity=".25"/>
    <line x1="30" y1="-13" x2="30" y2="13" stroke="#342b35" stroke-width="1" opacity=".25"/>
  </g>

  <!-- mascot drop shadow -->
  <ellipse cx="100" cy="234" rx="60" ry="9" fill="#342b35" opacity=".13"/>

  <!-- mascot (inlined from icon.svg) -->
  <g transform="translate(26 74) scale(1.15)">
    <g transform="rotate(-3 64 64)">
      <path d="M22 74c0-27 17-43 42-43s43 16 43 43c0 29-16 44-43 44S22 103 22 74Z" fill="#342B35" opacity=".18" transform="translate(6 4)"/>
      <path d="M22 72c0-27 17-43 42-43s43 16 43 43c0 29-16 44-43 44S22 101 22 72Z" fill="#FF6F83" stroke="#3D303C" stroke-width="6" stroke-linejoin="round"/>
      <path d="M29 57C19 38 29 17 53 13c8 11 10 27 6 38-7 11-20 16-30 6Z" fill="#FF6F83" stroke="#3D303C" stroke-width="6" stroke-linejoin="round"/>
      <path d="M99 57c10-19 0-40-24-44-8 11-10 27-6 38 7 11 20 16 30 6Z" fill="#FF6F83" stroke="#3D303C" stroke-width="6" stroke-linejoin="round"/>
      <ellipse cx="50" cy="75" rx="6" ry="9" fill="#3D303C"/>
      <ellipse cx="78" cy="75" rx="6" ry="9" fill="#3D303C"/>
      <path d="M55 94q9 7 18 0" fill="none" stroke="#3D303C" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="36" cy="93" rx="10" ry="5" fill="#FFB7C2"/>
      <ellipse cx="92" cy="93" rx="10" ry="5" fill="#FFB7C2"/>
    </g>
  </g>

  <!-- eyebrow pill -->
  <g transform="rotate(-1.5 271 82)">
    <rect x="196" y="70" width="156" height="24" rx="12" fill="#ff6f83" stroke="#342b35" stroke-width="2.5"/>
    <text x="274" y="87" text-anchor="middle" font-family="PingFang SC, Heiti SC, sans-serif" font-weight="700" font-size="12.5" fill="#fff8dc">一分钟猜词小游戏</text>
  </g>

  <!-- title highlight sticker (shadow + body) -->
  <g>
    <rect x="194" y="108" width="200" height="64" rx="10" fill="#342b35" transform="translate(4 4)"/>
    <rect x="194" y="108" width="200" height="64" rx="10" fill="#ffd84f" stroke="#342b35" stroke-width="3"/>
    <text x="294" y="156" text-anchor="middle" font-family="PingFang SC, Heiti SC, sans-serif" font-weight="900" font-size="58" fill="#342b35">猜猜团</text>
  </g>

  <!-- subtitle -->
  <text x="196" y="196" font-family="PingFang SC, Heiti SC, sans-serif" font-weight="700" font-size="17" letter-spacing="3.5" fill="#ff6f83">EMOJI GUESS</text>

  <!-- tagline -->
  <text x="194" y="222" font-family="PingFang SC, Heiti SC, sans-serif" font-weight="600" font-size="14" fill="#65545b">限时·闯关·无尽·每日</text>

  <!-- 60s sticker, bottom-right -->
  <g transform="translate(383 232) rotate(-8)">
    <rect x="-40" y="-20" width="80" height="40" rx="11" fill="#342b35" transform="translate(3 3)"/>
    <rect x="-40" y="-20" width="80" height="40" rx="11" fill="#ff6f83" stroke="#342b35" stroke-width="2.8"/>
    <text x="0" y="7" text-anchor="middle" font-family="PingFang SC, Heiti SC, sans-serif" font-weight="900" font-size="20" fill="#fff8dc">60秒</text>
  </g>

  <!-- sparkles -->
  <g fill="#ff6f83">
    <path d="M178 116 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 z"/>
  </g>
  <g fill="#ffd84f" stroke="#342b35" stroke-width="1.5">
    <path d="M180 200 l2.2 5 5 2.2 -5 2.2 -2.2 5 -2.2 -5 -5 -2.2 5 -2.2 z"/>
  </g>
</svg>
